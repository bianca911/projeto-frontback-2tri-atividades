<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulários</title>
</head>
<body>
    <h1>Atividade dos formulários</h1>

    <h2>Cadastro de usuário</h2>
    <form class="mi">
        <label class="for" for="titulo">Bota o nome aí</label><br>
        <textarea class="s" name="mensagem" rows="2" cols="40" placeholder="escreve aí"></textarea><br><br>

        <label class="for" for="titulo">Bota o e-mail aí</label><br>
        <textarea class="s" name="mensagem" rows="2" cols="40" placeholder="escreve o e-mal aí"></textarea><br><br>

        <label class="for" for="titulo">Bota a senha aí</label><br>
        <textarea class="s" name="mensagem" rows="2" cols="40" placeholder="escreve a senha aí"></textarea><br>
        
        <button type="submit">Aperta aí</button>
    </form>

    <h2>Cadastro de tarefa</h2>
    <form class="mi">
        <label class="for" for="titulo">Bota título aí</label><br>
        <textarea class="s" name="mensagem" rows="2" cols="40" placeholder="escreve o título aí"></textarea><br><br>

        <label class="for" for="titulo">Descreve aí</label><br>
        <textarea class="s" name="mensagem" rows="2" cols="40" placeholder="escreve a descrição aí"></textarea><br><br>

        <label class="for" for="titulo">Bota uma prioridade aí</label><br>
        <textarea class="s" name="mensagem" rows="2" cols="40" placeholder="escreve uma prioridade aí"></textarea><br>
        
        <button type="submit">Aperta aí</button>
    </form>

    <h2 class="">Reserva de espaço escolar</h2>
        <form class="mi">
            <label class="for" for="titulo">Bota título aí</label><br>
            <textarea class="s" name="mensagem" rows="2" cols="40" placeholder="escreve o título aí"></textarea><br><br>

            <label class="for" for="titulo">Descreve aí</label><br>
            <textarea class="s" name="mensagem" rows="2" cols="40" placeholder="escreve a descrição aí"></textarea><br><br>

            <label class="for" for="hora">Escolha um horário:</label>
            <input type="time" id="hora" name="hora" required>
            
            <label class="for" for="email">Escolha um horário:</label>
            <input class="s" type="email" name="e-mail" id="email" placeholder="escreve aí">

            <button type="submit">Aperta aí</button>
        </form>

    <label class="for" for="email">Escolha um horário:</label>
            <input class="s" type="email" name="e-mail" id="email" placeholder="escreve aí">

            <button type="submit">Aperta aí</button>

        



</body>
</html>
